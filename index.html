<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>muni-speed-map</title>
  </head>
  <body>
    <div id="root">
      <!-- Static loading screen shown before React mounts -->
      <div id="initial-loader" style="
        position: fixed;
        inset: 0;
        background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        color: white;
        font-family: system-ui, -apple-system, sans-serif;
      ">
        <div style="
          width: 48px;
          height: 48px;
          border: 3px solid rgba(0, 217, 255, 0.2);
          border-top-color: #00d9ff;
          border-radius: 50%;
          animation: initial-spin 0.8s linear infinite;
        "></div>
        <div style="font-size: 1.2rem; font-weight: 500; opacity: 0.95; letter-spacing: 0.5px;">
          Loading Transit Speed Map...
        </div>
        <div style="font-size: 0.85rem; opacity: 0.6;">
          Initializing application
        </div>
        <style>
          @keyframes initial-spin {
            to { transform: rotate(360deg); }
          }
        </style>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
